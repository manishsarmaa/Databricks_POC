resources:
  jobs:
    orders_medallion:
      name: orders_medallion
      tasks:
        - task_key: bronze
          notebook_task:
            notebook_path: ../notebooks/01_orders_bronze.py
        - task_key: silver
          depends_on:
            - task_key: bronze
          notebook_task:
            notebook_path: ../notebooks/02_orders_silver.py
        - task_key: gold
          depends_on:
            - task_key: silver
          notebook_task:
            notebook_path: ../notebooks/03_orders_gold.py
      # Free Edition runs serverless; no job_clusters block needed.
