# Azure DevOps pipeline.
# The whole point: tests run FIRST. The bundle only deploys if every test
# (including the OTHER pipelines' regression tests) is green. That is the
# automated answer to "how do I know my change didn't break the other pipelines".

trigger:
  branches:
    include:
      - main
      - feature/*

pool:
  vmImage: ubuntu-latest

stages:
  - stage: Test
    jobs:
      - job: unit_tests
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "3.11"
          - script: |
              python -m pip install --upgrade pip
              pip install -r requirements-dev.txt
            displayName: Install deps
          - script: pytest -q
            displayName: Run full test suite (regression net)

  - stage: Deploy
    dependsOn: Test
    condition: succeeded()   # no green tests => no deploy
    jobs:
      - job: deploy_bundle
        steps:
          - script: |
              curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
              databricks bundle validate -t dev
              databricks bundle deploy -t dev
            displayName: Validate & deploy Databricks Asset Bundle
            env:
              DATABRICKS_HOST: $(DATABRICKS_HOST)
              DATABRICKS_TOKEN: $(DATABRICKS_TOKEN)
